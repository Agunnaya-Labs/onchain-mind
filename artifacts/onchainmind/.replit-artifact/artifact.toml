kind = "web"
previewPath = "/"
title = "OnchainMind × AGL"
version = "1.0.0"
id = "artifacts/onchainmind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20202

[services.development]
run = "pnpm --filter @workspace/onchainmind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/onchainmind", "run", "build" ]
publicDir = "artifacts/onchainmind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20202"
BASE_PATH = "/"
